---
- name: Чтение версии установленного ПО
  shell: cat /opt/distr/software.conf | grep Astra-server
  register: version
  ignore_errors: yes

- name: Зададим имя хоста
  hostname:
    name: "{{ inventory_hostname }}.{{ domain }}"
    use: "systemd"
#  when: version.stdout != relis

- name: Удалим файл hosts
  file:
    path: /etc/hosts
    state: "{{ item }}"
  with_items:
    - absent
    - touch
#   when: version.stdout != relis

- name: Сздадим файл hosts
  template:
    src: hosts
    dest: /etc/hosts
    mode: 0644
    owner: root
#   when: version.stdout != relis

- name: Удалим файл sources.list
  file:
    path: /etc/apt/sources.list
    state: "{{ item }}"
  with_items:
    - absent
    - touch
#   when: version.stdout != relis

- name: Сздадим файл sources.list
  copy:
    src: sources.list
    dest: /etc/apt/sources.list
    mode: 0644
    owner: root
#   when: version.stdout != relis

- name: Сздадим файл aldpro
  copy:
    src: aldpro
    dest: /etc/apt/preferences.d/aldpro
    mode: 0644
    owner: root
#   when: version.stdout != relis

- name: Обновим репозитории и кэш
  apt:
    update_cache: yes
    force_apt_get: yes
#   when: version.stdout != relis

- name: Апдейт
  shell: astra-update -A -r
#  when: version.stdout != relis
  ignore_errors: yes


